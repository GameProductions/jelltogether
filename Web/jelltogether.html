<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JellTogether | Premium Watch Party</title>
    <link rel="stylesheet" href="jelltogether.css">
</head>
<body>
    <div class="vr-stars" id="vr-stars"></div>
    <div class="app-container">
        <!-- Main Content Area -->
        <main class="main-content">
            <header>
                <div class="logo">
                    <img src="logo.png" alt="" aria-hidden="true">
                    JellTogether
                </div>
                <div class="user-profile">
                    <span id="display-name">Loading...</span>
                </div>
            </header>

            <div id="lobby-view" class="view">
                <section style="margin-top: 40px;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <h1>Active Watch Parties</h1>
                        <button class="btn-join" style="width: auto; padding: 12px 25px;" onclick="app.createRoom()">+ Create Party</button>
                    </div>

                    <div class="glass-input-container" style="display: flex; gap: 10px; margin-top: 20px; margin-bottom: 30px; max-width: 500px;">
                        <input type="text" id="join-code-input" class="glass-input" placeholder="Enter Invite Code (e.g. X9K2)" style="margin-bottom: 0;">
                        <button class="action-btn" onclick="app.joinByCode()" style="padding: 0 25px; height: 50px;">Join</button>
                    </div>
                    
                    <div id="room-grid" class="room-grid">
                        <div class="loading">Searching for active parties...</div>
                    </div>
                </section>
            </div>

            <div id="party-view" class="view" style="display: none;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <button onclick="app.leaveRoom()" style="background: none; border: none; color: var(--text-dim); cursor: pointer;">← Back to Lobby</button>
                    <button id="btn-vr-mode" class="action-btn" onclick="app.toggleImmersiveMode()" style="display: none; border-radius: 50px; padding: 5px 15px; font-size: 0.7rem;">🥽 Enter VR</button>
                </div>
                <h1 id="current-room-name">Party Name</h1>
                <div class="room-stats">
                    <span id="participant-count">0 participants</span>
                </div>
                
                <div class="player-placeholder" style="margin-top: 30px; height: 400px; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 24px; display: flex; align-items: center; justify-content: center; color: var(--text-dim);">
                    Integration with Jellyfin Player Active
                </div>

                <div class="cinema-seats" id="cinema-seats"></div>

                <section style="margin-top: 40px;">
                    <h3>Theory Board</h3>
                    <div id="theory-board" class="theory-board">
                        <button class="action-btn" onclick="app.addTheory()" style="height: 150px; width: 150px;">+ New Theory</button>
                    </div>
                </section>

                <section style="margin-top: 40px; margin-bottom: 50px;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <h3>Up Next</h3>
                        <button class="btn-join" style="width: auto; padding: 5px 15px;" onclick="app.addToQueue()">+ Add to Queue</button>
                    </div>
                    <div id="queue-panel" class="queue-panel">
                        <div class="loading">Queue is empty.</div>
                    </div>
                </section>
            </div>
        </main>

        <aside class="sidebar">
            <header style="padding: 20px 30px; border-bottom: 1px solid var(--glass-border);">
                <h3>Party Management</h3>
                <div class="status-dot" title="Connected"></div>
            </header>

            <div id="participant-section" class="participant-section" style="padding: 20px; border-bottom: 1px solid var(--glass-border); max-height: 250px; overflow-y: auto; display: none;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <div style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim);">Participants</div>
                    <div id="participant-controls" style="display: flex; gap: 5px;">
                        <button id="btn-toggle-participant-invites" class="action-btn" onclick="app.toggleParticipantInvites()" title="Toggle Invite Privileges">🤝</button>
                        <button id="btn-toggle-privacy" class="action-btn" onclick="app.togglePrivacy()" title="Toggle Privacy">👁️</button>
                        <button id="btn-toggle-control" class="action-btn" onclick="app.toggleHostControl()" title="Toggle Control">🔓</button>
                    </div>
                </div>

                <div id="invite-code-container" style="background: var(--glass); border: 1px solid var(--glass-border); padding: 10px; border-radius: 12px; margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span id="invite-code-text" style="font-family: monospace; font-weight: bold; color: var(--accent);">CODE</span>
                        <div style="display: flex; gap: 5px;">
                            <button class="action-btn" style="padding: 5px 10px; font-size: 0.7rem;" onclick="app.copyInvite()">Copy</button>
                            <button class="action-btn" style="padding: 5px 10px; font-size: 0.7rem;" onclick="app.showShareModal()">QR/Link</button>
                        </div>
                    </div>
                </div>

                <div id="participant-list" class="participant-list"></div>
            </div>

            <div id="host-theme-controls" class="admin-group" style="display: none; padding: 20px; border-bottom: 1px solid var(--glass-border);">
                <div style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-bottom: 10px;">Theater Theme</div>
                <div style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
                    <button class="btn-theme" onclick="app.setTheme('default')">Modern</button>
                    <button class="btn-theme" onclick="app.setTheme('cinema')">Classic</button>
                    <button class="btn-theme" onclick="app.setTheme('horror')">Horror</button>
                    <button class="btn-theme" onclick="app.setTheme('anime')">Anime</button>
                    <button class="btn-theme" onclick="app.setTheme('scifi')">Space</button>
                </div>
            </div>

            <div id="host-discord-stage" class="admin-group" style="display: none; padding: 20px; border-bottom: 1px solid var(--glass-border);">
                <div style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-bottom: 10px;">Discord Stage</div>
                <input type="text" id="discord-stage-id" placeholder="Stage Channel ID" class="chat-input" style="margin-bottom: 0.5rem;">
                <input type="password" id="discord-bot-token" placeholder="Bot Token" class="chat-input" style="margin-bottom: 0.5rem;">
                <div style="display: flex; gap: 0.5rem;">
                    <button class="action-btn" onclick="app.saveDiscordStage()" style="flex: 1;">Save</button>
                    <button class="action-btn" onclick="app.syncDiscordStage()" style="flex: 1; background: var(--accent);">Sync</button>
                </div>
            </div>

            <div class="reaction-bar" style="padding: 10px 20px; display: flex; justify-content: space-around; border-bottom: 1px solid var(--glass-border);">
                <button class="action-btn" onclick="app.sendReaction('🔥')">🔥</button>
                <button class="action-btn" onclick="app.sendReaction('😂')">😂</button>
                <button class="action-btn" onclick="app.sendReaction('😮')">😮</button>
                <button class="action-btn" onclick="app.sendReaction('😢')">😢</button>
                <button class="action-btn" onclick="app.sendReaction('👏')">👏</button>
            </div>

            <div id="poll-section" class="poll-section" style="padding: 20px; border-bottom: 1px solid var(--glass-border); display: none;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <div style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim);">Live Polls</div>
                    <button id="btn-new-poll" class="action-btn" style="display: none;" onclick="showPollModal()">+</button>
                </div>
                <div id="poll-list" class="poll-list"></div>
            </div>
            
            <div class="chat-container">
                <div style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-bottom: 15px; padding: 0 10px;">Chat</div>
                <div id="chat-messages" class="chat-messages"></div>
                <div class="chat-input-area">
                    <input type="text" id="chat-input" class="chat-input" placeholder="Type a message..." disabled>
                    <button id="btn-send" class="btn-send" onclick="app.sendMessage()" disabled>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </aside>
    </div>

    <!-- Modals -->
    <div id="share-modal" class="glass-card" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1000; padding: 30px; width: 90%; max-width: 450px; text-align: center;">
        <h3>Invite Manager</h3>
        <div id="qr-container" style="margin: 20px auto; width: 180px; height: 180px; background: white; padding: 10px; border-radius: 12px;"></div>
        <div class="glass-input-container" style="margin-bottom: 20px;">
            <input type="text" id="share-link-text" class="glass-input" readonly>
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="action-btn" style="flex: 1;" onclick="app.copyShareLink()">Copy Link</button>
            <button class="action-btn" style="flex: 1; background: var(--text-dim);" onclick="app.hideShareModal()">Close</button>
        </div>
    </div>
    <div id="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 999;" onclick="app.hideShareModal()"></div>

    <script src="strings.js"></script>
    <script src="jelltogether.js"></script>
</body>
</html>
